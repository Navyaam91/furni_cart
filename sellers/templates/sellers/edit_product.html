{% extends 'blank_layout.html' %}
{% load static %}

{% block content %}
<div class="hero">
    <div class="container">
        <h1>Edit Product: {{ product.name }}</h1>
    </div>
</div>

<div class="untree_co-section before-footer-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <form action="" method="POST" enctype="multipart/form-data" class="card p-4">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text" name="name" value="{{ product.name }}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="4">{{ product.description }}</textarea>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Price</label>
                            <input type="number" step="0.01" name="price" value="{{ product.price }}" class="form-control" required>
                        </div>
                        <div class="col">
                            <label class="form-label">Stock</label>
                            <input type="number" name="stock" value="{{ product.stock }}" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-control" required>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if cat.id == product.category.id %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Current Image</label>
                        <div class="mb-2">
                            <img src="{{ product.image.url }}" width="150" class="img-thumbnail">
                        </div>
                        <label class="form-label">Change Product Image (optional)</label>
                        <input type="file" name="image" class="form-control">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-black">Update Product</button>
                        <a href="{% url 'seller_product_list' %}" class="btn btn-outline-black">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
